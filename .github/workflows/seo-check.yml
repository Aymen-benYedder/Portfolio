name: SEO & Schema Checks

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install link checker
        run: npm install -g linkinator@3

      - name: Run JSON-LD validator
        run: node scripts/validate-jsonld.mjs

      - name: Run linkinator (broken link check)
        env:
          BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          echo "Checking internal links..."
          npx linkinator "${{ secrets.SITE_BASE_URL }}" --skip "**/assets/**" || true

  lighthouse:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v8
        with:
          urls: ${{ secrets.SITE_BASE_URL }}
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
