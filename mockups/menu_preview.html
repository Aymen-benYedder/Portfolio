<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Mockup - Industrial Elegant</title>
    <link rel="stylesheet" href="../css/vars.css">
    <style>
        body {
            background-color: var(--bg-primary);
            background-image: var(--bg-aurora);
            /* Dark mode aurora */
            font-family: var(--font-primary);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            overflow: hidden;
        }

        /* Mockup Container visualization */
        .mock-preview {
            width: 100%;
            height: 400px;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            /* Emulate page content darkness */
        }

        /* ==========================================================================
           PROPOSED MENU DESIGN: "The Floating Command Hub"
           ========================================================================== */

        .nav-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: auto;
            max-width: 90%;
        }

        /* The Pill Shape Container */
        .nav-hub {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(10, 10, 15, 0.7);
            /* Deep dark glass */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 6px 8px;
            border-radius: 9999px;
            /* Pill shape */
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                /* Deep shadow */
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            /* Top inner glow */
        }

        /* Logo Area */
        .nav-logo-area {
            display: flex;
            align-items: center;
            padding-left: 12px;
            padding-right: 16px;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            margin-right: 4px;
        }

        .nav-logo {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-logo span {
            color: var(--accent-primary);
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 4px;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            display: flex;
            align-items: center;
            height: 36px;
            padding: 0 16px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 99px;
            transition: all 0.3s ease;
        }

        /* Hover State: "Lit" Effect */
        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Active State: "Active Pill" */
        .nav-link.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* CTA Button */
        .nav-cta {
            margin-left: 8px;
        }

        .btn-spotlight {
            display: flex;
            align-items: center;
            height: 36px;
            padding: 0 20px;
            background: var(--accent-primary);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 99px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-spotlight:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
        }

        /* Theme Toggle (Mini) */
        .nav-actions {
            display: flex;
            align-items: center;
            padding-left: 8px;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            margin-left: 4px;
        }

        .theme-btn-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .theme-btn-mini:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>

    <!-- MOCKUP START -->
    <div class="nav-container">
        <nav class="nav-hub">
            <!-- Brand -->
            <div class="nav-logo-area">
                <a href="#" class="nav-logo">AYMEN<span>.DEV</span></a>
            </div>

            <!-- Links -->
            <ul class="nav-links">
                <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="#" class="nav-link active">Experience</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Skills</a></li>
            </ul>

            <!-- Actions -->
            <div class="nav-actions">
                <button class="theme-btn-mini">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>

            <!-- CTA -->
            <div class="nav-cta">
                <a href="#" class="btn-spotlight">Let's Talk</a>
            </div>
        </nav>
    </div>
    <!-- MOCKUP END -->

</body>

</html>
